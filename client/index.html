    <script>
      (function() {
          // Create a Web Worker dynamically from a string
          // Web Workers are not subjected to the same aggressive background throttling as the main thread.
          const workerCode = `
              let timer = null;
              self.onmessage = (e) => {
                  if (e.data === 'start' && !timer) {
                      // Fire at ~30 FPS (33ms) when in background to keep the connection alive
                      timer = setInterval(() => self.postMessage('tick'), 33);
                  } else if (e.data === 'stop') {
                      clearInterval(timer);
                      timer = null;
                  }
              };
          `;
          const workerBlob = new Blob([workerCode], { type: 'application/javascript' });
          const worker = new Worker(URL.createObjectURL(workerBlob));

          // Save references to the original browser functions
          const nativeRaf = window.requestAnimationFrame;
          const nativeCaf = window.cancelAnimationFrame;

          // State to track pending animation frames
          let callbacks = new Map();
          let idCounter = 0;

          // Override requestAnimationFrame
          window.requestAnimationFrame = (callback) => {
              const id = ++idCounter;
              callbacks.set(id, callback);

              // If the tab is visible, pass the work directly to the browser's native rAF
              if (!document.hidden) {
                  nativeRaf((timestamp) => {
                      // Only execute if it wasn't cancelled
                      if (callbacks.has(id)) {
                          callbacks.delete(id);
                          callback(timestamp);
                      }
                  });
              }
              return id;
          };

          // 4. Override cancelAnimationFrame
          window.cancelAnimationFrame = (id) => {
              callbacks.delete(id);
          };

          // 5. Listen to the Web Worker ticks when in the background
          worker.onmessage = () => {
              if (document.hidden) {
                  const now = performance.now();
                  // Copy and clear the callbacks map before executing to prevent infinite loops 
                  // if a callback immediately requests another animation frame
                  const currentCallbacks = Array.from(callbacks.entries());
                  callbacks.clear(); 
                  
                  for (const [id, callback] of currentCallbacks) {
                      try {
                          // console.log("Executing a callback stored from Worker");
                          callback(now);
                      } catch (e) {
                          console.error("Error in background rAF callback:", e);
                      }
                  }
              }
          };

          // 6. Handle tab visibility changes
          document.addEventListener('visibilitychange', () => {
              if (document.hidden) {
                  // Tab lost focus: Start the Web Worker metronome
                  worker.postMessage('start');
              } else {
                  // Tab gained focus: Stop the worker and flush any pending frames immediately
                  worker.postMessage('stop');
                  nativeRaf((timestamp) => {
                      const currentCallbacks = Array.from(callbacks.entries());
                      callbacks.clear();
                      for (const [id, callback] of currentCallbacks) {
                          callback(timestamp);
                      }
                  });
              }
          });
      })();
  </script>
