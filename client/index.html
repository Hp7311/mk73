<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Mk73</title>
    <style>
        html,
        body,
        canvas {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: absolute;
            z-index: 0;
        }
    </style>
    <link data-trunk rel="copy-dir" href="assets/"></link>
</head>

<body>
    <canvas id="bevy_canvas" tabindex="0">Your browser does not support canvas.</canvas>
    <script>
        (function() {
            // post 'tick' message to worker if receives 'start'
            const workerCode = `
              let timer = null;
              self.onmessage = (e) => {
                  if (e.data === 'start' && !timer) {
                      // Fire at ~30 FPS (33ms) when in background to keep the connection alive
                      timer = setInterval(() => self.postMessage('tick'), 33);
                  } else if (e.data === 'stop') {
                      clearInterval(timer);
                      timer = null;
                  }
              };
          `;
            const workerBlob = new Blob([workerCode], {
                type: 'application/javascript'
            });
            const worker = new Worker(URL.createObjectURL(workerBlob));

            const nativeRaf = window.requestAnimationFrame;
            const nativeCaf = window.cancelAnimationFrame;

            let callbacks = new Map();
            let idCounter = 0;

            window.requestAnimationFrame = (callback) => {
                const id = ++idCounter;
                callbacks.set(id, callback);

                // If the tab is visible, pass the work directly to the browser's native rAF
                if (!document.hidden) {
                    nativeRaf((timestamp) => {
                        // Only execute if it wasn't cancelled
                        if (callbacks.has(id)) {
                            callbacks.delete(id);
                            callback(timestamp);
                        }
                    });
                }
                return id;
            };

            window.cancelAnimationFrame = (id) => {
                callbacks.delete(id);
            };

            worker.onmessage = () => {
                if (document.hidden) {
                    const now = performance.now();
                    // Copy and clear the callbacks map before executing to prevent infinite loops 
                    // if a callback immediately requests another animation frame
                    const currentCallbacks = Array.from(callbacks.entries());
                    callbacks.clear();

                    for (const [id, callback] of currentCallbacks) {
                        try {
                            callback(now);
                        } catch (e) {
                            console.error("Error in background rAF callback:", e);
                        }
                    }
                }
            };

            document.addEventListener('visibilitychange', () => {
                if (document.hidden) {
                    worker.postMessage('start');
                    // console.info("Worker starting");
                } else {
                    worker.postMessage('stop');
                    // console.info("Worker stopping");
                    nativeRaf((timestamp) => {
                        const currentCallbacks = Array.from(callbacks.entries());
                        callbacks.clear();
                        for (const [id, callback] of currentCallbacks) {
                            // console.info("calling RAF with id " + id + "with callback " + callback)
                            callback(timestamp);
                        }
                    });
                }
            });
        })();
    </script>
</body>

</html>
